<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>My Personal Docs</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Barra de menú superior -->
  <header>
    <nav class="menu">
      <ul>
        <li>Archivo
          <ul class="submenu">
            <li>Nuevo</li>
            <li>Abrir</li>
            <li>Guardar</li>
            <li>Guardar Como</li>
            <li>Imprimir</li>
            <li>Página</li>
          </ul>
        </li>
        <li>Editar
          <ul class="submenu">
            <li>Deshacer</li>
            <li>Rehacer</li>
          </ul>
        </li>
        <li>Insertar
          <ul class="submenu">
            <li>Imagen</li>
            <li>Tabla</li>
            <li>Símbolos</li>
            <li>Emojis</li>
            <li>Índice</li>
          </ul>
        </li>
        <li>Numerar Páginas</li>
      </ul>
    </nav>
  </header>

  <!-- Barra de formato -->
  <section class="toolbar">
    <select id="font-family">
      <option>Arial</option>
      <option>Times New Roman</option>
      <option>Verdana</option>
    </select>

    <input id="font-size" type="number" min="8" max="150" value="12">

    <button><b>N</b></button>
    <button><i>K</i></button>
    <button><u>S</u></button>
    <input type="color" id="font-color">
    <input type="color" id="highlight-color">
    <button>Izq</button>
    <button>Centro</button>
    <button>Der</button>
  </section>

  <!-- Área de documento con múltiples páginas -->
  <main id="pages">
    <div class="page">
      <div class="page-number"></div>
      <div class="header"></div>
      <div class="footer"></div>
      <div class="doc-content" contenteditable="true"></div>
    </div>
  </main>

  <!-- Modal genérico -->
  <div id="modal" class="modal hidden">
    <div class="modal-content"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
