<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>My Personal Docs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Barra superior principal -->
  <div id="toolbar">
    <button id="btn-archivo">Archivo ▼</button>
    <button><img src="iconos/deshacer.png" alt="Deshacer"></button>
    <button><img src="iconos/rehacer.png" alt="Rehacer"></button>
    <button id="btn-numerar"><img src="iconos/numerar.png" alt="Numerar páginas"></button>
  </div>

  <!-- Barra de formato -->
  <div id="format-bar">
    <!-- Fuente -->
    <select id="fuente-select">
      <option>Arial</option>
      <option>Times New Roman</option>
      <option>Verdana</option>
      <option>Calibri</option>
      <option>Georgia</option>
    </select>

    <!-- Tamaño -->
    <select id="tamano-select">
      <option>8</option><option>10</option><option>12</option>
      <option>14</option><option>16</option><option>18</option>
      <option>20</option><option>24</option><option>26</option>
      <option>28</option><option>30</option><option>34</option>
      <option>36</option><option>38</option><option>40</option>
      <option>46</option><option>50</option><option>55</option>
      <option>60</option><option>65</option><option>70</option>
      <option>75</option><option>80</option><option>90</option>
      <option>100</option><option>125</option><option>150</option>
      <option>180</option><option>200</option><option>225</option>
      <option>250</option>
    </select>

    <!-- Botones N K S -->
    <button id="btn-negrita">N</button>
    <button id="btn-cursiva">K</button>
    <button id="btn-subrayado">S</button>

    <!-- Color de fuente -->
    <input type="color" id="color-fuente" value="#000000">

    <!-- Color de resaltado -->
    <input type="color" id="color-resaltado" value="#ffffff">

    <!-- Alineación -->
    <button id="align-left"><img src="iconos/align-left.png" alt="Izquierda"></button>
    <button id="align-center"><img src="iconos/align-center.png" alt="Centro"></button>
    <button id="align-right"><img src="iconos/align-right.png" alt="Derecha"></button>
  </div>

  <!-- Menú Archivo desplegable -->
  <div id="archivo-menu" class="dropdown">
    <ul>
      <li id="nuevo">Nuevo</li>
      <li id="abrir">Abrir</li>
      <li id="guardar">Guardar</li>
      <li id="guardar-como">Guardar Como</li>
      <li id="imprimir">Imprimir</li>
      <li id="pagina">Página</li>
    </ul>
  </div>

  <!-- Barra lateral Insertar -->
  <div id="insertar-menu">
    <!-- ... igual que antes ... -->
  </div>

  <!-- Área de documento -->
  <div id="doc-area">
    <div class="page">
      <!-- Numeración de página -->
      <div id="page-number-toggle">#</div>
      <div id="doc-content" contenteditable="true"></div>
    </div>
  </div>

  <!-- Modales -->
  <!-- ... todos los modales que ya definiste ... -->

  <!-- Scripts -->
  <script src="archivo.js"></script>
  <script src="editar.js"></script>
  <script src="insertar.js"></script>
  <script src="numeracion.js"></script>
  <script src="hojas.js"></script>
  <script src="formato.js"></script>
  <script src="interfaz.js"></script>
</body>
</html>
