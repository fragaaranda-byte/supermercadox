<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>My Personal Docs</title>
    <link rel="stylesheet" href="interfaz.css">
</head>
<body>

<!-- BARRA SUPERIOR -->
<div id="barra-superior">

    <div class="menu-archivo">
        <button class="btn-menu">Archivo</button>
        <div class="submenu-archivo">
            <button id="btnNuevo">Nuevo</button>
            <button id="btnAbrir">Abrir</button>
            <button id="btnGuardar">Guardar</button>
            <button id="btnGuardarComo">Guardar Como</button>
        </div>
    </div>

    <button class="btn-icono" id="btnDeshacer"><img src="iconos/deshacer.png"></button>
    <button class="btn-icono" id="btnRehacer"><img src="iconos/rehacer.png"></button>
    <button class="btn-icono" id="btnNumerar"><img src="iconos/numeracion.png"></button>
    <button class="btn-icono" id="btnNumerar"><img src="iconos/imprimir.png"></button>
    <button class="btn-icono" id="btnNumerar"><img src="iconos/config.png"></button>

</div>

<!-- BARRA DE FORMATO -->
<div id="barra-formato">

    <select id="fuenteSelect">
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Calibri</option>
        <option>Verdana</option>
        <option>Courier New</option>
    </select>

    <select id="sizeSelect">
        <option>8</option>
        <option>10</option>
        <option>12</option>
        <option>14</option>
        <option>16</option>
        <option>18</option>
        <option>20</option>
        <option>24</option>
        <option>32</option>
        <option>48</option>
        <option>72</option>
        <option>100</option>
        <option>150</option>
        <option>200</option>
        <option>250</option>
    </select>

    <button class="btn-texto" id="btnNegrita">N</button>
    <button class="btn-texto" id="btnCursiva">K</button>
    <button class="btn-texto" id="btnSubrayado">S</button>

    <input type="color" id="colorTexto" title="Color de letra">
    <input type="color" id="colorFondo" title="Color de resaltado">

    <button class="btn-icono" id="btnIzq"><img src="iconos/izq.png"></button>
    <button class="btn-icono" id="btnCentro"><img src="iconos/centrado.png"></button>
    <button class="btn-icono" id="btnDer"><img src="iconos/der.png"></button>

</div>

<!-- CONTENEDOR PRINCIPAL -->
<div id="contenedor">

    <!-- PANEL INSERTAR -->
    <div id="panel-insertar">
        <div class="bloque-insertar">
            <button class="btn-icono" id="btnInsertarImagen"><img src="iconos/imagen.png"></button>
            <button class="btn-icono" id="btnIndice1)">1)</button>
            <button class="btn-icono" id="btnIndice1.">1.</button>
            <button class="btn-icono" id="btnIndiceA)">A)</button>
            <button class="btn-icono" id="btnIndicea)">a)</button>
            <button class="btn-icono" id="btnIndiceA.">A.</button>
            <button class="btn-icono" id="btnIndicea.">a.</button>
        </div>

        <div class="bloque-tabla">
            <p>Tabla (máx 10x10)</p>
            <div class="grid-tabla">
                <!-- 10 x 10 -->
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
            </div>
        </div>

        <div class="bloque-simbolos">
            <p>Símbolos</p>
            <div class="simbolos">
                <button>+</button><button>/</button><button>*</button><button>-</button>
                <button>?</button><button>¡</button><button>´</button><button>{</button>
                <button>}</button><button>[</button><button>]</button>
                <button>^</button><button>~</button><button>'</button>
                <button>¿</button><button>=</button><button>)</button>
                <button>(</button><button>&</button><button>%</button>
                <button>$</button><button>#</button><button>"</button>
                <button>!</button><button>°</button><button>|</button>
                <button>¬</button><button>\</button>
            </div>
        </div>
    </div>

    <!-- EDITOR DE PÁGINAS -->
    <div id="editor">

        <!-- PÁGINA 1 -->
        <div class="page">

            <div class="page-header" contenteditable="false"></div>

            <div class="page-content" contenteditable="true">
                <p></p>
            </div>

            <div class="page-footer" contenteditable="false"></div>

        </div>

    </div>

</div>

<!-- MODAL NUMERACIÓN -->
<div id="modalNumeracion" class="modal oculto">
    <div class="modal-contenido">

        <div class="modal-titulo">Numeración de Páginas</div>

        <div class="modal-botones-esquinas">
            <button data-pos="top-left">↖</button>
            <button data-pos="top-right">↗</button>
            <button data-pos="bottom-left">↙</button>
            <button data-pos="bottom-right">↘</button>
        </div>

        <div class="modal-acciones">
            <button id="btnAceptarNumeracion">Aceptar</button>
            <button id="btnCancelarNumeracion">Cancelar</button>
        </div>

    </div>
</div>

<!-- OVERLAY -->
<div id="overlay" class="oculto"></div>

<!-- SCRIPTS -->
<script src="logica.js"></script>
<script src="mypersonaldocs.js"></script>

</body>
</html>
