<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>My Personal Docs</title>
    <link rel="stylesheet" href="interfaz.css">
</head>
<body>

<!-- BARRA SUPERIOR -->
<div id="barra-superior">
    <div class="menu-archivo">
        <button class="btn-menu">Archivo</button>
        <div class="submenu-archivo">
            <button id="btnNuevo">Nuevo</button>
            <button id="btnAbrir">Abrir</button>
            <button id="btnGuardar">Guardar</button>
        </div>
    </div>

    <button class="btn-icono" id="btnDeshacer"><img src="iconos/deshacer.png"></button>
    <button class="btn-icono" id="btnRehacer"><img src="iconos/rehacer.png"></button>
    <button class="btn-icono" id="btnNumerar"><img src="iconos/numeracion.png"></button>
    <button class="btn-icono" id="btnImprimir"><img src="iconos/imprimir.png"></button>
    <button class="btn-icono" id="btnConfig"><img src="iconos/config.png"></button>
</div>

<!-- BARRA DE FORMATO -->
<div id="barra-formato">
    <select id="fuenteSelect">
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Calibri</option>
        <option>Verdana</option>
        <option>Courier New</option>
    </select>

    <select id="sizeSelect">
        <option>8</option><option>10</option><option>12</option><option>14</option>
        <option>16</option><option>18</option><option>20</option><option>24</option>
        <option>32</option><option>48</option><option>72</option><option>100</option>
        <option>150</option><option>200</option><option>250</option>
    </select>

    <button class="btn-texto" id="btnNegrita">N</button>
    <button class="btn-texto" id="btnCursiva">K</button>
    <button class="btn-texto" id="btnSubrayado">S</button>

    <input type="color" id="colorTexto" title="Color de letra">
    <input type="color" id="colorFondo" title="Color de resaltado">

    <button class="btn-icono" id="btnIzq"><img src="iconos/izq.png"></button>
    <button class="btn-icono" id="btnCentro"><img src="iconos/centrado.png"></button>
    <button class="btn-icono" id="btnDer"><img src="iconos/der.png"></button>
</div>

<!-- CONTENEDOR PRINCIPAL -->
<div id="contenedor">
    <!-- PANEL INSERTAR -->
    <div id="panel-insertar">
        <div class="bloque-insertar">
            <button class="btn-icono" id="btnInsertarImagen"><img src="iconos/imagen.png"></button>
            <button class="btn-icono" id="btnIndice1)"><font size="32">1)</font></button>
            <button class="btn-icono" id="btnIndice1."><font size="32">1.</font></button>
            <button class="btn-icono" id="btnIndiceA)"><font size="32">A)</font></button>
            <button class="btn-icono" id="btnIndicea)"><font size="32">a)</font></button>
            <button class="btn-icono" id="btnIndiceA."><font size="32">A.</font></button>
            <button class="btn-icono" id="btnIndicea."><font size="32">a.</font></button>
        </div>

        <div class="bloque-tabla">
            <p>Tabla (máx 10x10)</p>
            <div class="grid-tabla">
                <!-- 50 divs de ejemplo -->
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
            </div>
        </div>

        <div class="bloque-simbolos">
            <p>Símbolos</p>
            <div class="simbolos">
                <button>+</button><button>/</button><button>*</button><button>-</button>
                <button>?</button><button>¡</button><button>´</button><button>{</button>
                <button>}</button><button>[</button><button>]</button>
                <button>^</button><button>~</button><button>'</button>
                <button>¿</button><button>=</button><button>)</button>
                <button>(</button><button>&</button><button>%</button>
                <button>$</button><button>#</button><button>"</button>
                <button>!</button><button>°</button><button>|</button>
                <button>¬</button><button>\</button>
            </div>
        </div>
    </div>

    <!-- EDITOR DE PÁGINAS -->
    <div id="editor">
        <div class="page">
            <div class="page-header" contenteditable="false"></div>
            <div class="page-content" contenteditable="true"><p></p></div>
            <div class="page-footer" contenteditable="false"></div>
        </div>
    </div>
</div>

<!-- MODALES -->

<!-- Modal Numeración -->
<div id="modalNumeracion" class="modal oculto">
    <div class="modal-contenido">
        <div class="modal-titulo">Numeración de Páginas</div>
        <div class="modal-campos">
            <p>¿Cómo desea la numeración?</p>
            <label>Posición:</label>
            <select id="posicionNumeracion">
                <option>Esquina superior izquierda</option>
                <option>Esquina superior derecha</option>
                <option>Esquina inferior izquierda</option>
                <option>Esquina inferior derecha</option>
            </select><br><br>
            <label>Estilo:</label>
            <button id="numNegrita">N</button>
            <button id="numCursiva">K</button>
            <button id="numSubrayado">S</button><br><br>
            <label>Tamaño:</label>
            <select id="tamanioNumeracion">
                <option>8</option><option>9</option><option>10</option><option>11</option>
                <option>12</option><option>13</option><option>14</option><option>15</option>
                <option>16</option><option>17</option><option>18</option><option>19</option>
                <option>20</option><option>21</option><option>22</option><option>23</option>
                <option>24</option><option>25</option>
            </select>
        </div>
        <div class="modal-acciones">
            <button id="aceptarNumeracion">Aceptar</button>
            <button id="cancelarNumeracion">Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal Configuración de Página -->
<div id="modalConfigPaginas" class="modal oculto">
    <div class="modal-contenido">
        <div class="modal-titulo">Configuración de Páginas</div>
        <div class="modal-campos">
            <label>Orientación:</label>
            <select id="orientacionPagina">
                <option>Vertical</option>
                <option>Horizontal</option>
            </select><br><br>
            <label>Hoja:</label>
            <select id="tipoHoja">
                <option>A4</option>
                <option>A3</option>
                <option>A5</option>
                <option>Carta</option>
                <option>Legal</option>
            </select><br><br>
            <p>Márgenes:</p>
            <label>Sup Izq:</label>
            <select id="margenSupIzq">
                <option>1.5</option><option>2</option><option>3</option><option>4</option><option>5</option>
            </select>
            <label>Sup Der:</label>
            <select id="margenSupDer">
                <option>1.5</option><option>2</option><option>3</option><option>4</option><option>5</option>
            </select><br>
            <label>Inf Izq:</label>
            <select id="margenInfIzq">
                <option>1.5</option><option>2</option><option>3</option><option>4</option><option>5</option>
            </select>
            <label>Inf Der:</label>
            <select id="margenInfDer">
                <option>1.5</option><option>2</option><option>3</option><option>4</option><option>5</option>
            </select>
        </div>
        <div class="modal-acciones">
            <button id="aceptarConfig">Aceptar</button>
            <button id="cancelarConfig">Cancelar</button>
        </div>
    </div>
</div>

<!-- Modal Nuevo -->
<div id="modalNuevo" class="modal oculto">
    <div class="modal-contenido">
        <div class="modal-titulo">Nuevo Documento</div>
        <div class="modal-campos">
            <p>¿Desea descartar el documento actual y generar uno nuevo en blanco?</p>
        </div>
        <div class="modal-acciones">
            <button id="nuevoSi">Sí</button>
            <button id="nuevoNo">No</button>
        </div>
    </div>
</div>

<!-- Modal Abrir -->
<div id="modalAbrir" class="modal oculto">
    <div class="modal-contenido">
        <div class="modal-titulo">Abrir Documento</div>
        <div class="modal-campos">
            <p>¿Desea descartar el documento actual y abrir otro?</p>
        </div>
        <div class="modal-acciones">
            <button id="abrirSi">Sí</button>
            <button id="abrirNo">No</button>
        </div>
    </div>
</div>

<!-- Overlay -->
<div id="overlay" class="oculto"></div>

<!-- Scripts -->
<script src="logica.js"></script>
<script src="mypersonaldocs.js"></script>

</body>
</html>
