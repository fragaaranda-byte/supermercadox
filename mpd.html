<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>My Personal Docs</title>
    <link rel="stylesheet" href="interfaz.css">
</head>
<body>

<!-- BARRA SUPERIOR -->
<div id="barra-superior">

    <div class="menu-archivo">
        <button class="btn-menu">Archivo</button>
        <div class="submenu-archivo">
            <button>Nuevo</button>
            <button>Abrir</button>
            <button>Guardar</button>
            <button>Guardar Como</button>
            <button>Imprimir</button>
            <button>Página</button>
        </div>
    </div>

    <button class="btn-icono"><img src="iconos/deshacer.png"></button>
    <button class="btn-icono"><img src="iconos/rehacer.png"></button>
    <button class="btn-icono"><img src="iconos/numerar.png"></button>

</div>

<!-- BARRA DE FORMATO -->
<div id="barra-formato">

    <select>
        <option>Arial</option>
        <option>Times New Roman</option>
        <option>Calibri</option>
        <option>Verdana</option>
        <option>Courier New</option>
    </select>

    <select>
        <option>10</option>
        <option>12</option>
        <option>14</option>
        <option>16</option>
        <option>18</option>
        <option>20</option>
        <option>24</option>
        <option>32</option>
    </select>

    <button class="btn-texto">N</button>
    <button class="btn-texto">K</button>
    <button class="btn-texto">S</button>

    <input type="color" title="Color de letra">
    <input type="color" title="Color de resaltado">

    <button class="btn-icono"><img src="iconos/izquierda.png"></button>
    <button class="btn-icono"><img src="iconos/centrado.png"></button>
    <button class="btn-icono"><img src="iconos/derecha.png"></button>

</div>

<!-- CONTENEDOR PRINCIPAL -->
<div id="contenedor">

    <!-- PANEL INSERTAR -->
    <div id="panel-insertar">

        <div id="toggle-panel"><<</div>

        <div class="bloque-insertar">
            <button class="btn-icono"><img src="iconos/imagen.png"></button>
            <button class="btn-icono"><img src="iconos/indice.png"></button>
        </div>

        <div class="bloque-tabla">
            <p>Tabla (máx 10x10)</p>
            <div class="grid-tabla">
                <!-- 100 celdas -->
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
                <div></div><div></div><div></div><div></div><div></div>
            </div>
        </div>

        <div class="bloque-simbolos">
            <p>Símbolos</p>
            <div class="simbolos">
                <button>+</button><button>/</button><button>*</button><button>-</button>
                <button>?</button><button>¡</button><button>´</button><button>{</button>
                <button>}</button><button>[</button><button>]</button>
                <button>^</button><button>~</button><button>'</button>
                <button>¿</button><button>=</button><button>)</button>
                <button>(</button><button>&</button><button>%</button>
                <button>$</button><button>#</button><button>"</button>
                <button>!</button><button>°</button><button>|</button>
                <button>¬</button>
            </div>
        </div>

        <div class="bloque-emojis">
            <p>Emojis</p>
            <div class="emojis">
                <img src="emojis/emoji1.png">
                <img src="emojis/emoji2.png">
                <img src="emojis/emoji3.png">
                <img src="emojis/emoji4.png">
            </div>
        </div>

    </div>

    <!-- AREA DE DOCUMENTO -->
    <div id="editor" contenteditable="true">
        Escribe tu documento aquí...
    </div>

</div>

    <!-- SCRIPTS -->
<script src="logica.js"></script>
<script src="mypersonaldocs.js"></script>

</body>
</html>
